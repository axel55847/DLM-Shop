<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DLM-SHOP · Panier unique</title>
  <style>
    :root{--accent:#6a0dad;--sub:#00d2ff;--glow:rgba(0,210,255,.45);--bg:#020208;--line:rgba(255,255,255,.08);--text:#fff;--muted:rgba(255,255,255,.65)}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,sans-serif;background:radial-gradient(circle at top, rgba(106,13,173,.18), transparent 35%), linear-gradient(180deg,#020208 0%,#060610 100%);color:var(--text)}
    header{background:rgba(2,2,8,.72);backdrop-filter:blur(18px);padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.06);text-align:center;position:sticky;top:0;z-index:10}
    h1{margin:0;font-size:2.3rem;letter-spacing:6px;text-transform:uppercase;background:linear-gradient(135deg,#fff 0%,var(--sub) 50%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    main{max-width:1280px;margin:auto;padding:34px 20px 56px}
    .hero{text-align:center;padding:18px 20px 34px}
    .hero .eyebrow{font-size:.8rem;letter-spacing:6px;text-transform:uppercase;color:var(--sub);opacity:.8;margin-bottom:10px}
    .flex-row{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start}
    .shop-section{flex:2;min-width:260px}
    .cart-section{flex:1.2;min-width:280px;position:sticky;top:90px}
    .cart-card{background:rgba(0,0,0,.55);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:28px;padding:20px}
    .cart-title{font-size:1.3rem;font-weight:800;margin:0 0 16px;text-align:center;color:var(--sub)}
    .cart-item{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.08);padding:10px 0;font-size:.85rem}
    .cart-item-info{flex:1}
    .cart-item-name{font-weight:800}
    .cart-item-price{color:var(--sub)}
    .cart-item-actions{display:flex;gap:6px;align-items:center}
    .cart-qty-btn{background:rgba(255,255,255,.1);border:none;color:white;width:26px;height:26px;border-radius:8px;cursor:pointer}
    .cart-remove{background:rgba(255,75,43,.2);border:none;color:#ff6b4a;border-radius:8px;padding:4px 8px;cursor:pointer;font-size:.7rem}
    .cart-total{font-size:1.2rem;font-weight:900;text-align:right;margin:16px 0 12px;padding-top:12px;border-top:1px solid var(--line)}
    .cart-empty{text-align:center;padding:24px;color:var(--muted);font-style:italic}
    .validate-btn{background:var(--sub);color:#000;border:none;width:100%;padding:14px;border-radius:24px;font-weight:900;text-transform:uppercase;letter-spacing:2px;cursor:pointer;margin-top:12px}
    .nav-grid{display:grid;grid-template-columns:repeat(3,minmax(140px,1fr));gap:14px;margin-bottom:24px}
    .nav-btn{background:var(--sub);padding:12px;border-radius:16px;font-weight:900;text-transform:uppercase;letter-spacing:2px;cursor:pointer;border:none;color:#000}
    .section{display:none}
    .section.active{display:block}
    h2{font-size:1.7rem;margin:0 0 22px;text-align:center;letter-spacing:4px;color:var(--sub)}
    .grid{display:grid;grid-template-columns:1fr;gap:18px;max-width:500px;margin:0 auto}
    .card{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:28px;padding:24px;text-align:center}
    .card img{width:100%;height:220px;object-fit:contain;background:#fff;border-radius:20px;margin-bottom:16px}
    .card h3{margin:0 0 10px;font-size:1.3rem}
    .card p{color:var(--muted);font-size:.9rem}
    .price{font-size:2rem;font-weight:900;color:var(--sub);margin:16px 0}
    .add-btn{padding:12px 20px;background:var(--sub);border:none;border-radius:40px;font-weight:900;font-size:1rem;cursor:pointer;width:100%}
    .selector-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0}
    .mini-btn{padding:8px 16px;border-radius:40px;border:1px solid rgba(0,210,255,.5);background:rgba(255,255,255,.05);color:#fff;font-size:.8rem;cursor:pointer;transition:.2s}
    .mini-btn.active{background:var(--sub);color:#000;border-color:var(--sub)}
    .discord-input-area{background:rgba(0,0,0,.5);border-radius:20px;padding:12px 18px;margin-bottom:20px}
    .discord-input-area label{display:block;font-size:.8rem;margin-bottom:6px;color:var(--sub)}
    .discord-input-area input{width:100%;padding:10px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.6);color:white}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#000;color:var(--sub);border:1px solid var(--sub);padding:10px 24px;border-radius:50px;z-index:1000;display:none}
    footer{padding:28px;text-align:center;color:rgba(255,255,255,.28);border-top:1px solid rgba(255,255,255,.05)}
    @media (max-width:800px){.flex-row{flex-direction:column}.cart-section{position:static}}
  </style>
</head>
<body>
<header><h1>DLM-Corp</h1></header>
<main>
  <div class="hero"><div class="eyebrow">DLM-SHOP · Choix unique par catégorie</div></div>
  <div class="discord-input-area">
    <label>🔐Votre pseudo Discord (obligatoire)🔐</label>
    <input type="text" id="discordUsername" placeholder="Ex: pierre#1234 ou pierre">
  </div>
  <div class="flex-row">
    <div class="shop-section">
      <div class="nav-grid">
        <button class="nav-btn" onclick="showSection('mugs')">Mugs</button>
        <button class="nav-btn" onclick="showSection('coussins')">Coussins</button>
        <button class="nav-btn" onclick="showSection('magnets')">Magnets</button>
      </div>
      <!-- Section MUGS :  -->
      <section class="section active" id="mugs">
        <h2>Tasses personnalisables</h2>
        <div class="grid">
          <div class="card">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%23333'/%3E%3Ctext x='50%25' y='50%25' font-size='20' fill='white' text-anchor='middle' dy='.3em'%3EMug%3C/text%3E%3C/svg%3E" alt="Tasse">
            <h3>Mug / Tasse DLM</h3>
            <div class="selector-row" id="mugTypeSelector"></div>
            <div class="selector-row" id="mugSizeSelector"></div>
            <div class="price" id="mugPriceDisplay">19 €</div>
            <button class="add-btn" onclick="addCurrentMugToCart()">Ajouter au panier</button>
          </div>
        </div>
      </section>
      <!-- Section COUSSINS -->
      <section class="section" id="coussins">
        <h2>Coussin</h2>
        <div class="grid">
          <div class="card">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%23333'/%3E%3Ctext x='50%25' y='50%25' font-size='16' fill='white' text-anchor='middle' dy='.3em'%3ECoussin%3C/text%3E%3C/svg%3E" alt="Coussin">
            <h3>Coussin 40,6 x 40,6 cm</h3>
            <div class="price">50 €</div>
            <button class="add-btn" onclick="addCoussinToCart()">Ajouter au panier</button>
          </div>
        </div>
      </section>
      <!-- Section MAGNETS : -->
      <section class="section" id="magnets">
        <h2>Magnets</h2>
        <div class="grid">
          <div class="card">
            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%23333'/%3E%3Ctext x='50%25' y='50%25' font-size='16' fill='white' text-anchor='middle' dy='.3em'%3EMagnet%3C/text%3E%3C/svg%3E" alt="Magnet">
            <h3>Magnet DLM</h3>
            <div class="selector-row" id="magnetTypeSelector"></div>
            <div class="price" id="magnetPriceDisplay">6 €</div>
            <button class="add-btn" onclick="addCurrentMagnetToCart()">Ajouter au panier</button>
          </div>
        </div>
      </section>
    </div>
    <div class="cart-section">
      <div class="cart-card">
        <div class="cart-title">🛒Mon panier🛒</div>
        <div id="cartItemsList"></div>
        <div id="cartTotal" class="cart-total">Total : 0 €</div>
        <button id="validateOrderBtn" class="validate-btn">✅Valider la commande✅</button>
      </div>
    </div>
  </div>
</main>
<footer>DLM-SHOP</footer>
<div id="toastMsg" class="toast"></div>

<script>
  const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1494020560416407712/GWjYJEPRI69B13v1NHwO9eZwqAtJWDhip1pV-4COINRRYhFtgFtv-9yhZ5DJNUu3s_LR";

  // Données produits
  const mugTypes = {
    classique: { label: "Mug classique", sizes: {325: 19, 444: 20} },
    deux_couleurs: { label: "Tasse à deux couleurs", sizes: {325: 20, 444: 23} },
    verre_glace: { label: "Tasse en verre glacé", sizes: {296: 24, 473: 30} },
    voyage_travail: { label: "Tasse voyage/travail", sizes: {444: 25} }
  };
  const magnetTypes = {
    rond: { label: "Magnet rond", price: 6, sizeLabel: "5,7 cm" },
    carre: { label: "Magnet carré", price: 6.5, sizeLabel: "5,1 cm" },
    rectangle: { label: "Magnet rectangle", price: 7, sizeLabel: "8,89 x 6,35 cm" }
  };

  let currentMugTypeKey = "classique";
  let currentMugSize = "325";
  let currentMagnetKey = "rond";

  let cart = JSON.parse(localStorage.getItem("dlm_shop_cart")) || [];

  function saveCart() { localStorage.setItem("dlm_shop_cart", JSON.stringify(cart)); renderCart(); }

  function addToCart(name, price, details = {}) {
    const id = `${name.replace(/\s/g, '_')}_${Date.now()}_${Math.random().toString(36).substr(2, 4)}`;
    const existing = cart.find(item => item.name === name && JSON.stringify(item.details) === JSON.stringify(details));
    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({ id, name, price, qty: 1, details });
    }
    saveCart();
    showToast(`➕ Ajouté : ${name} (${price} €)`);
  }

  function updateQty(id, delta) {
    const idx = cart.findIndex(i => i.id === id);
    if (idx === -1) return;
    const newQty = cart[idx].qty + delta;
    if (newQty <= 0) cart.splice(idx, 1);
    else cart[idx].qty = newQty;
    saveCart();
  }

  function removeItem(id) {
    cart = cart.filter(i => i.id !== id);
    saveCart();
  }

  function renderCart() {
    const container = document.getElementById("cartItemsList");
    const totalSpan = document.getElementById("cartTotal");
    if (!container) return;
    if (cart.length === 0) {
      container.innerHTML = '<div class="cart-empty">Votre panier est vide</div>';
      totalSpan.innerHTML = "Total : 0 €";
      return;
    }
    let total = 0;
    let html = "";
    cart.forEach(item => {
      const itemTotal = item.price * item.qty;
      total += itemTotal;
      html += `<div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${escapeHtml(item.name)}</div>
          <div class="cart-item-price">${item.price} € x ${item.qty}</div>
        </div>
        <div class="cart-item-actions">
          <button class="cart-qty-btn" onclick="updateQty('${item.id}', -1)">-</button>
          <span style="min-width:28px;text-align:center">${item.qty}</span>
          <button class="cart-qty-btn" onclick="updateQty('${item.id}', 1)">+</button>
          <button class="cart-remove" onclick="removeItem('${item.id}')">✕</button>
        </div>
      </div>`;
    });
    container.innerHTML = html;
    totalSpan.innerHTML = `Total : ${total.toFixed(2)} €`;
  }

  function renderMugOptions() {
    const typeContainer = document.getElementById("mugTypeSelector");
    const sizeContainer = document.getElementById("mugSizeSelector");
    if (!typeContainer) return;
    // Boutons types
    typeContainer.innerHTML = Object.keys(mugTypes).map(key => `
      <button class="mini-btn ${currentMugTypeKey === key ? 'active' : ''}" data-type="${key}" onclick="selectMugType('${key}')">${mugTypes[key].label}</button>
    `).join('');
    updateMugSizes();
  }

  function updateMugSizes() {
    const sizeContainer = document.getElementById("mugSizeSelector");
    const sizes = mugTypes[currentMugTypeKey].sizes;
    if (!Object.keys(sizes).includes(currentMugSize)) currentMugSize = Object.keys(sizes)[0];
    sizeContainer.innerHTML = Object.keys(sizes).map(size => `
      <button class="mini-btn ${currentMugSize === size ? 'active' : ''}" data-size="${size}" onclick="selectMugSize('${size}')">${size} ml (${sizes[size]} €)</button>
    `).join('');
    document.getElementById("mugPriceDisplay").innerText = sizes[currentMugSize] + " €";
  }

  function selectMugType(type) { currentMugTypeKey = type; renderMugOptions(); }
  function selectMugSize(size) { currentMugSize = size; updateMugSizes(); }

  function addCurrentMugToCart() {
    const typeData = mugTypes[currentMugTypeKey];
    const price = typeData.sizes[currentMugSize];
    const name = `${typeData.label} · ${currentMugSize} ml`;
    addToCart(name, price, { type: currentMugTypeKey, size: currentMugSize });
  }

  function renderMagnetOptions() {
    const container = document.getElementById("magnetTypeSelector");
    if (!container) return;
    container.innerHTML = Object.keys(magnetTypes).map(key => `
      <button class="mini-btn ${currentMagnetKey === key ? 'active' : ''}" data-magnet="${key}" onclick="selectMagnetType('${key}')">${magnetTypes[key].label} (${magnetTypes[key].sizeLabel})</button>
    `).join('');
    document.getElementById("magnetPriceDisplay").innerText = magnetTypes[currentMagnetKey].price + " €";
  }

  function selectMagnetType(type) { currentMagnetKey = type; renderMagnetOptions(); }

  function addCurrentMagnetToCart() {
    const magnet = magnetTypes[currentMagnetKey];
    addToCart(magnet.label, magnet.price, { type: currentMagnetKey });
  }

  function addCoussinToCart() {
    addToCart("Coussin 40,6x40,6 cm", 50, {});
  }

  async function sendOrderToDiscord(discordUser, items, total) {
    const itemLines = items.map(i => `${i.name} x${i.qty} → ${(i.price * i.qty).toFixed(2)} €`).join('\n');
    const embed = {
      title: "🛒NOUVELLE COMMANDE🛒",
      color: 0x00d2ff,
      fields: [
        { name: "👤 Client Discord", value: discordUser, inline: false },
        { name: "📦 Articles", value: itemLines.substring(0, 1000), inline: false },
        { name: "💰 Total", value: `${total.toFixed(2)} €`, inline: true },
        { name: "🕒 Date", value: new Date().toLocaleString('fr-FR'), inline: true }
      ],
      footer: { text: "DLM-Shop · Paiement à la livraison" },
      timestamp: new Date().toISOString()
    };
    try {
      const res = await fetch(DISCORD_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ embeds: [embed] })
      });
      return res.ok;
    } catch(e) { return false; }
  }

  async function validateOrder() {
    const discordUser = document.getElementById("discordUsername").value.trim();
    if (!discordUser) {
      showToast("❌ Entrez votre pseudo Discord avant de valider !", true);
      return;
    }
    if (cart.length === 0) {
      showToast("🛒Panier vide🛒", true);
      return;
    }
    const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    const success = await sendOrderToDiscord(discordUser, cart, total);
    if (success) {
      showToast(`✅Commande envoyée au staff un admin vous contactera dans les plus bref delay✅ Réf: ${Date.now().toString(36).toUpperCase()}`);
      cart = [];
      saveCart();
    } else {
      showToast("⚠️Erreur d'envoi, réessayez⚠️", true);
    }
  }

  function showToast(msg, isErr = false) {
    const toast = document.getElementById("toastMsg");
    toast.textContent = msg;
    toast.style.display = "block";
    toast.style.background = isErr ? "#8b0000" : "#000";
    toast.style.borderColor = isErr ? "#ff4b2b" : "var(--sub)";
    setTimeout(() => toast.style.display = "none", 4000);
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function showSection(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // Initialisation
  renderMugOptions();
  renderMagnetOptions();
  renderCart();
  document.getElementById("validateOrderBtn").addEventListener("click", validateOrder);
  window.selectMugType = selectMugType;
  window.selectMugSize = selectMugSize;
  window.addCurrentMugToCart = addCurrentMugToCart;
  window.selectMagnetType = selectMagnetType;
  window.addCurrentMagnetToCart = addCurrentMagnetToCart;
  window.addCoussinToCart = addCoussinToCart;
  window.updateQty = updateQty;
  window.removeItem = removeItem;
  window.showSection = showSection;
</script>
</body>
</html>
